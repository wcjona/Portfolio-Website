    <script>
      // Apply theme + palette + font before paint to avoid flash.
      (function () {
        var root = document.documentElement;
        root.dataset.font = "sans";
        try {
          var stored = localStorage.getItem("theme:v2");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored === "light" || stored === "dark" ? stored : prefersDark ? "dark" : "light";
          if (theme === "dark") root.classList.add("dark");
        } catch (e) {}
        try {
          var font = localStorage.getItem("font:v1");
          if (font === "sans" || font === "serif") root.dataset.font = font;
        } catch (e) {}
        try {
          var paletteVars = localStorage.getItem("palette-vars:v2");
          if (paletteVars) {
            var parsed = JSON.parse(paletteVars);
            for (var key in parsed) {
              if (parsed.hasOwnProperty(key) && key.indexOf("--") === 0) {
                root.style.setProperty(key, parsed[key]);
              }
            }
          }
        } catch (e) {}
      })();
    </script>
